services:
  frontend:
    image: registry.spokayhub.top/efrei-projet-fil-rouge-cicd-frontend:${IMAGE_TAG:-latest}
    container_name: fil-rouge-cicd-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    env_file:
      - ./fil-rouge-cicd-frontend.env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
